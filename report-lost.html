<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report an Item Lost - Personal Lost and Found</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Report an Item Lost</h1>
      <p class="tagline">Help us find your missing item by providing details below.</p>
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="index.html" class="back-link">← Back to Home</a>
        <button id="theme-btn" class="btn-secondary" style="cursor: pointer;">🌙 Dark Mode</button>
      </div>
    </header>

    <section class="form-section">
      <form class="form">
        <div class="form-group">
          <label for="item-name">Item Name *</label>
          <input type="text" id="item-name" name="item-name" placeholder="e.g., Blue Backpack" required />
        </div>

        <div class="form-group">
          <label for="description">Description *</label>
          <textarea id="description" name="description" rows="4" placeholder="Describe the item in detail..." required></textarea>
        </div>

        <div class="form-group">
          <label for="location">Location Lost *</label>
          <input type="text" id="location" name="location" placeholder="e.g., Downtown Mall" required />
        </div>

        <div class="form-group">
          <label for="date-lost">Date Lost *</label>
          <input type="date" id="date-lost" name="date-lost" required />
        </div>

        <div class="form-group">
          <label for="contact-email">Email *</label>
          <input type="email" id="contact-email" name="contact-email" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <label for="contact-phone">Phone Number</label>
          <input type="tel" id="contact-phone" name="contact-phone" placeholder="Optional" />
        </div>

        <div class="form-group">
          <label for="photo">Photo</label>
          <input type="file" id="photo" name="photo" accept="image/*" />
        </div>

        <button type="submit" class="btn-submit">Submit Report</button>
      </form>
    </section>

    <footer>
      <p>Your report helps others find and return your item. (This is a demo - no data is actually submitted)</p>
    </footer>
  </div>

  <script>
    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }
    
    // Theme toggle button
    const themeBtn = document.getElementById('theme-btn');
    if (themeBtn) {
      const updateThemeBtn = () => {
        themeBtn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
      };
      updateThemeBtn();
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        updateThemeBtn();
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report an Item Found - Personal Lost and Found</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Report Found Item</h1>
      <p class="tagline">Help a stranger recover their lost belongings by reporting what you found.</p>
      <div class="header-controls">
        <a href="index.html" class="back-link">← Back to Home</a>
        <div class="theme-toggle-wrapper">
          <input type="checkbox" id="theme-toggle" class="theme-toggle-input" />
          <label for="theme-toggle" class="theme-toggle-label"></label>
        </div>
      </div>
    </header>

    <section class="form-section">
      <form class="form">
        <div class="form-group">
          <label for="item-name">Item Name *</label>
          <input type="text" id="item-name" name="item-name" placeholder="e.g., Silver Watch" required />
        </div>

        <div class="form-group">
          <label for="description">Description *</label>
          <textarea id="description" name="description" rows="4" placeholder="Describe the item and its condition..." required></textarea>
        </div>

        <div class="form-group">
          <label for="found-location">Location Found *</label>
          <input type="text" id="found-location" name="found-location" placeholder="e.g., Park Bench" required />
        </div>

        <div class="form-group">
          <label for="date-found">Date Found *</label>
          <input type="date" id="date-found" name="date-found" required />
        </div>

        <div class="form-group">
          <label for="pickup-point">Where Can Owner Pick Up? *</label>
          <input type="text" id="pickup-point" name="pickup-point" placeholder="e.g., Police Station, Your Address" required />
        </div>

        <div class="form-group">
          <label for="contact-email">Your Email *</label>
          <input type="email" id="contact-email" name="contact-email" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <label for="contact-phone">Your Phone Number</label>
          <input type="tel" id="contact-phone" name="contact-phone" placeholder="Optional" />
        </div>

        <div class="form-group">
          <label for="photo">Photo of Item</label>
          <input type="file" id="photo" name="photo" accept="image/*" />
        </div>

        <button type="submit" class="btn-submit">Submit Report</button>
      </form>
    </section>

    <footer>
      <p>&copy; 2026 Personal Lost & Found. Helping communities reunite. | <a href="#" class="footer-link">Privacy</a> | <a href="#" class="footer-link">Contact</a></p>
    </footer>
  </div>

  <script>
    // Store user IP in cookie
    function storeUserIP() {
      fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
          const ip = data.ip;
          const date = new Date();
          date.setTime(date.getTime() + 30 * 24 * 60 * 60 * 1000); // 30 days
          document.cookie = `user_ip=${ip}; expires=${date.toUTCString()}; path=/`;
        })
        .catch(err => console.log('Could not fetch IP'));
    }
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      document.getElementById('theme-toggle').checked = true;
    }
    
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.addEventListener('change', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
      });
    }
    
    // Store IP on load
    storeUserIP();
  </script>
</body>
</html>
